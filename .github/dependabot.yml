# Dependabot configuration for the Farm OS npm-workspaces monorepo.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2

updates:
  # npm dependencies. The root manifest declares workspaces (packages/*, apps/*),
  # so a single root entry covers every workspace package.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    # Keep noise low: cap concurrent dependency PRs.
    open-pull-requests-limit: 5
    # Bundle minor/patch dev-dependency bumps into one PR to reduce review churn.
    groups:
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"

  # GitHub Actions used by the workflows in .github/workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
