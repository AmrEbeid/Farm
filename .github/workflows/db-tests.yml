name: db-tests

# Runs the Farm OS pgTAP suite (RLS isolation, audit immutability, seed invariants, the
# SPEC-0001 stock engine, and the security-remediation regressions) on every PR/push.
# Uses the Docker-free harness in apps/farm-os/supabase/test-shims — a plain local
# PostgreSQL + pgTAP with Supabase shims — so it needs neither Docker nor the Supabase CLI.
#
# NOTE: a local superuser bypasses RLS, so this does NOT verify FORCE ROW LEVEL SECURITY,
# and it does not exercise PostgREST/GoTrue or the Playwright e2e. With the local Docker
# stack removed, this harness is the authoritative AUTOMATED DB gate; full-stack integration
# (`supabase test db` + `npx playwright test`) is verified against the remote (or a Supabase
# branch) project via the Supabase MCP.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: db-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pgtap:
    name: pgTAP — RLS · audit · seed · engine · security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Guard against duplicate migration VERSION numbers (two files sharing the same
      # 20260622NNNNNN_ prefix). git won't flag them (different filenames) and the
      # Docker-free harness applies both if they create different objects — so pgTAP stays
      # GREEN — but a prod `supabase db push` keys schema_migrations on the version and
      # would skip/error on the second one, silently leaving it unapplied. Two parallel
      # sessions auto-merging stale-base PRs repeatedly produced these (0048/0070-0074);
      # fail fast so a duplicate can never merge.
      - name: Check for duplicate migration versions
        run: |
          set -euo pipefail
          dups="$(ls apps/farm-os/supabase/migrations/*.sql | xargs -n1 basename | sed -E 's/^([0-9]+)_.*/\1/' | sort | uniq -d)"
          if [ -n "$dups" ]; then
            echo "::error::Duplicate migration version number(s) — renumber before merge:"
            for v in $dups; do ls apps/farm-os/supabase/migrations/"${v}"_*.sql; done
            exit 1
          fi
          echo "OK: migration version numbers are unique"

      - name: Install PostgreSQL + pgTAP
        run: |
          set -euo pipefail
          sudo apt-get update
          # ubuntu-latest ships a postgresql server; ensure one is present, then add the
          # matching pgTAP extension package (postgresql-<major>-pgtap).
          sudo apt-get install -y postgresql postgresql-contrib
          PGVER="$(ls -1 /usr/lib/postgresql/ | sort -V | tail -1)"
          sudo apt-get install -y "postgresql-${PGVER}-pgtap"
          echo "PG_BIN=/usr/lib/postgresql/${PGVER}/bin" >> "$GITHUB_ENV"
          "/usr/lib/postgresql/${PGVER}/bin/pg_config" --version

      - name: Run pgTAP suite (Docker-free harness)
        run: bash apps/farm-os/supabase/test-shims/run-pgtap-local.sh
