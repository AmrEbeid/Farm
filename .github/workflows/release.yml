name: release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release:
    name: version or publish (changesets)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: packages/ui/.nvmrc
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: "@amrebeid"

      - name: Install (workspace root)
        run: npm ci

      - name: Install Linux native bindings (npm/cli#4828)
        # Resolve versions from packages/ui but install from ROOT (installing from
        # packages/ui nests a 2nd React and breaks context-based tests).
        run: |
          pkgs=""
          for spec in "rolldown:@rolldown/binding-linux-x64-gnu" "rollup:@rollup/rollup-linux-x64-gnu" "esbuild:@esbuild/linux-x64"; do
            mod="${spec%%:*}"; pkg="${spec#*:}"
            v=$(cd packages/ui && node -p "try{require('${mod}/package.json').version}catch(e){''}")
            if [ -n "$v" ]; then pkgs="${pkgs} ${pkg}@${v}"; fi
          done
          npm install --no-save --no-audit --no-fund ${pkgs}

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: npm run version
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
