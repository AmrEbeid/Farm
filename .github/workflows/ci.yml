name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck · tokens · test · build · storybook
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node from .nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: packages/ui/.nvmrc
          cache: npm

      - name: Install (workspace root)
        run: npm ci

      - name: Install Linux native bindings (npm/cli#4828)
        # npm ci preserves the single hoisted React (the lib declares ^18 but the
        # monorepo overrides to 19; the clean lockfile tree dedupes to one copy) and
        # the correct hoisting, but skips Linux optional native binaries absent from
        # the macOS lockfile. Resolve each binding's version from the packages/ui
        # context (where rolldown/rollup/esbuild are reachable) but INSTALL FROM ROOT:
        # installing from packages/ui re-resolves and nests a 2nd React there, which
        # breaks context-based tests (ToastProvider/useToast). One install so none get
        # pruned as extraneous.
        run: |
          pkgs=""
          for spec in "rolldown:@rolldown/binding-linux-x64-gnu" "rollup:@rollup/rollup-linux-x64-gnu" "esbuild:@esbuild/linux-x64"; do
            mod="${spec%%:*}"; pkg="${spec#*:}"
            v=$(cd packages/ui && node -p "try{require('${mod}/package.json').version}catch(e){''}")
            if [ -n "$v" ]; then pkgs="${pkgs} ${pkg}@${v}"; fi
          done
          echo "installing:${pkgs}"
          npm install --no-save --no-audit --no-fund ${pkgs}

      - name: Typecheck
        run: npm run typecheck --workspace @amrebeid/ui

      - name: Token presence
        run: npm run tokens:present --workspace @amrebeid/ui

      - name: Token purity
        run: npm run tokens:purity --workspace @amrebeid/ui

      - name: Unit + a11y tests
        run: npm test --workspace @amrebeid/ui

      - name: Build (ESM + CJS + d.ts + styles.css)
        run: npm run build --workspace @amrebeid/ui

      - name: Build Storybook
        run: npm run build-storybook --workspace @amrebeid/ui

  app:
    name: app · typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node from .nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: packages/ui/.nvmrc
          cache: npm

      - name: Install (workspace root)
        run: npm ci

      - name: Install app Linux natives (npm/cli#4828)
        # The macOS-generated lockfile omits some Linux optional native binaries, so a
        # clean `npm ci` on the runner can miss @next/swc / Tailwind oxide / lightningcss —
        # the exact failure that broke the Vercel build. Resolve each from the app context
        # and install from root (no re-nesting), matching the lib job's approach.
        run: |
          pkgs=""
          for spec in "next:@next/swc-linux-x64-gnu" "@tailwindcss/oxide:@tailwindcss/oxide-linux-x64-gnu" "lightningcss:lightningcss-linux-x64-gnu"; do
            mod="${spec%%:*}"; pkg="${spec#*:}"
            v=$(cd apps/farm-os && node -p "try{require('${mod}/package.json').version}catch(e){''}")
            if [ -n "$v" ]; then pkgs="${pkgs} ${pkg}@${v}"; fi
          done
          echo "installing:${pkgs}"
          npm install --no-save --no-audit --no-fund ${pkgs}

      - name: Typecheck (app)
        run: cd apps/farm-os && npx tsc --noEmit

      - name: Unit tests (app)
        run: npm test --workspace farm-os

      - name: Build (next build --webpack)
        run: npm run build --workspace farm-os
