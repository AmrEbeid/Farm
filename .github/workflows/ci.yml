name: ci

# Quality gates for the Farm OS monorepo, on every PR to / push to main.
#
#   build job  (packages/ui — @amrebeid/ui design library):
#     typecheck → token presence → token purity → unit + a11y tests → build → Storybook
#   app job    (apps/farm-os — Next.js application):
#     typecheck → lint (eslint) → unit tests (vitest) → build (next build --webpack)
#
# pgTAP database tests live in db-tests.yml; npm publish/versioning lives in release.yml.
# The Linux-natives install steps work around npm/cli#4828 (macOS-generated lockfile omits
# some Linux optional native binaries); see the inline notes on each.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck · tokens · test · build · storybook
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: packages/ui/.nvmrc
          cache: npm

      - name: Install (workspace root)
        run: npm ci

      - name: Install Linux native bindings (npm/cli#4828)
        # npm ci preserves the single hoisted React (the lib declares ^18 but the
        # monorepo overrides to 19; the clean lockfile tree dedupes to one copy) and
        # the correct hoisting, but skips Linux optional native binaries absent from
        # the macOS lockfile. Resolve each binding's version from the packages/ui
        # context (where rolldown/rollup/esbuild are reachable) but INSTALL FROM ROOT:
        # installing from packages/ui re-resolves and nests a 2nd React there, which
        # breaks context-based tests (ToastProvider/useToast). One install so none get
        # pruned as extraneous.
        run: |
          pkgs=""
          for spec in "rolldown:@rolldown/binding-linux-x64-gnu" "rollup:@rollup/rollup-linux-x64-gnu" "esbuild:@esbuild/linux-x64"; do
            mod="${spec%%:*}"; pkg="${spec#*:}"
            v=$(cd packages/ui && node -p "try{require('${mod}/package.json').version}catch(e){''}")
            if [ -n "$v" ]; then pkgs="${pkgs} ${pkg}@${v}"; fi
          done
          echo "installing:${pkgs}"
          npm install --no-save --no-audit --no-fund ${pkgs}

      - name: Typecheck
        run: npm run typecheck --workspace @amrebeid/ui

      - name: Token presence
        run: npm run tokens:present --workspace @amrebeid/ui

      - name: Token purity
        run: npm run tokens:purity --workspace @amrebeid/ui

      - name: Unit + a11y tests
        run: npm test --workspace @amrebeid/ui

      - name: Build (ESM + CJS + d.ts + styles.css)
        run: npm run build --workspace @amrebeid/ui

      - name: Build Storybook
        run: npm run build-storybook --workspace @amrebeid/ui

  app:
    name: app · typecheck · lint · test · build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: packages/ui/.nvmrc
          cache: npm

      - name: Install (workspace root)
        run: npm ci

      - name: Install app Linux natives (npm/cli#4828)
        # The macOS-generated lockfile omits some Linux optional native binaries, so a
        # clean `npm ci` on the runner can miss @next/swc / Tailwind oxide / lightningcss —
        # the exact failure that broke the Vercel build. Resolve each from the app context
        # and install from root (no re-nesting), matching the lib job's approach.
        run: |
          pkgs=""
          for spec in "next:@next/swc-linux-x64-gnu" "@tailwindcss/oxide:@tailwindcss/oxide-linux-x64-gnu" "lightningcss:lightningcss-linux-x64-gnu" "rolldown:@rolldown/binding-linux-x64-gnu"; do
            mod="${spec%%:*}"; pkg="${spec#*:}"
            v=$(cd apps/farm-os && node -p "try{require('${mod}/package.json').version}catch(e){''}")
            if [ -n "$v" ]; then pkgs="${pkgs} ${pkg}@${v}"; fi
          done
          echo "installing:${pkgs}"
          npm install --no-save --no-audit --no-fund ${pkgs}

      - name: Typecheck (app)
        run: cd apps/farm-os && npx tsc --noEmit

      - name: Lint (app · eslint)
        # The app declares an `eslint` lint script + eslint.config.mjs but it was not run
        # in CI; lint regressions could land silently. Run it as a fast fail-early gate
        # before the heavier test/build steps.
        run: npm run lint --workspace farm-os

      - name: Unit tests (app)
        run: npm test --workspace farm-os

      - name: Build (next build --webpack)
        run: npm run build --workspace farm-os

      - name: Guard · Recharts stays code-split (off the global bundle)
        # Recharts is heavy and only two routes render a chart. A code-split keeps it
        # out of the always-loaded shared/framework chunk and off the other 16/18
        # routes. This guard scans the built .next client chunks for "recharts", then
        # asserts the recharts-bearing chunk is referenced ONLY by the two allow-listed
        # chart routes' per-route client-reference manifests — never by build-manifest
        # rootMainFiles (the global bundle) nor any other route. It is hash-agnostic
        # (the chunk is discovered by content, matched by basename) and self-checking
        # (fails loudly if recharts vanishes or the .next layout moves). Pure Node, no
        # external actions/secrets. See apps/farm-os/scripts/check-recharts-codesplit.mjs.
        run: cd apps/farm-os && node scripts/check-recharts-codesplit.mjs

      - name: Guard · No "use client" helper functions called from Server Components
        # @amrebeid/ui exports plain helper functions (tabId/tabPanelId) from its
        # "use client" Tabs module. A Server Component may render a client component
        # or pass it as a prop, but calling a client function directly throws at
        # request-time ("Attempted to call tabPanelId() from the server") — invisible
        # to next build / tsc / eslint. This source scan fails if any Server Component
        # imports those helpers from a client barrel (@/components/ui, @amrebeid/ui)
        # instead of the server-safe @/lib/tab-ids mirror. Pure Node, no build needed.
        # See apps/farm-os/scripts/check-client-fn-in-server.mjs.
        run: cd apps/farm-os && node scripts/check-client-fn-in-server.mjs

  secret-scan:
    name: gitleaks · secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history for the git-mode scan

      - name: gitleaks · scan committed history
        # PROJECT RULES (docs/CLAUDE.md) require "secret scanning that blocks a leak
        # before commit." Pin the gitleaks binary and scan all commits against
        # .gitleaks.toml (build artifacts / vendored trees allowlisted there). Exits
        # non-zero — and fails the gate — the moment a real secret is committed.
        run: |
          VER=8.30.1
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks git . --config .gitleaks.toml --log-opts="--all" --redact
