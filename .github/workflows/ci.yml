name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck · tokens · test · build · storybook
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node from .nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: packages/ui/.nvmrc
          cache: npm

      - name: Install (workspace root)
        run: npm ci

      - name: Install Linux native bindings (npm/cli#4828)
        # npm ci preserves the lockfile's correct hoisting + type resolution, but
        # skips Linux optional native binaries absent from the macOS lockfile.
        # Install each, pinned to the resolved version of its parent package:
        # rolldown (vitest), rollup (tsup d.ts + Storybook/Vite), esbuild (tsup/Vite).
        working-directory: packages/ui
        run: |
          pkgs=""
          for spec in "rolldown:@rolldown/binding-linux-x64-gnu" "rollup:@rollup/rollup-linux-x64-gnu" "esbuild:@esbuild/linux-x64"; do
            mod="${spec%%:*}"; pkg="${spec#*:}"
            v=$(node -p "try{require('${mod}/package.json').version}catch(e){''}")
            if [ -n "$v" ]; then pkgs="${pkgs} ${pkg}@${v}"; fi
          done
          echo "installing:${pkgs}"
          # Single install so none of the prior --no-save additions get pruned as extraneous.
          npm install --no-save --no-audit --no-fund ${pkgs}

      - name: Typecheck
        run: npm run typecheck --workspace @amrebeid/ui

      - name: Token presence
        run: npm run tokens:present --workspace @amrebeid/ui

      - name: Token purity
        run: npm run tokens:purity --workspace @amrebeid/ui

      - name: Unit + a11y tests
        run: npm test --workspace @amrebeid/ui

      - name: Build (ESM + CJS + d.ts + styles.css)
        run: npm run build --workspace @amrebeid/ui

      - name: Build Storybook
        run: npm run build-storybook --workspace @amrebeid/ui
